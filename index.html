<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Trainingstracker">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Trainingstracker</title>
<style>
  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --fill: #f2f2f7;
    --fill2: #e9e9eb;
    --sep: rgba(60, 60, 67, 0.12);
    --text: #000000;
    --muted: #8a8a8e;
    --accent: #007aff;
    --accent2: #34c759;
    --orange: #ff9500;
    --danger: #ff3b30;
    --radius: 14px;
    --navbg: rgba(249, 249, 249, 0.88);
  }
  @media (prefers-color-scheme: dark) {
    :root:not(.light) {
      --bg: #000000;
      --card: #1c1c1e;
      --fill: #2c2c2e;
      --fill2: #3a3a3c;
      --sep: rgba(84, 84, 88, 0.45);
      --text: #ffffff;
      --muted: #8d8d93;
      --accent: #0a84ff;
      --accent2: #30d158;
      --orange: #ff9f0a;
      --danger: #ff453a;
      --navbg: rgba(22, 22, 24, 0.88);
    }
  }
  :root.dark {
    --bg: #000000;
    --card: #1c1c1e;
    --fill: #2c2c2e;
    --fill2: #3a3a3c;
    --sep: rgba(84, 84, 88, 0.45);
    --text: #ffffff;
    --muted: #8d8d93;
    --accent: #0a84ff;
    --accent2: #30d158;
    --orange: #ff9f0a;
    --danger: #ff453a;
    --navbg: rgba(22, 22, 24, 0.88);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    overscroll-behavior-y: none;
  }
  #view {
    padding: calc(env(safe-area-inset-top) + 22px) 16px calc(env(safe-area-inset-bottom) + 116px);
    max-width: 560px;
    margin: 0 auto;
  }
  h1 { font-size: 33px; font-weight: 800; letter-spacing: 0.2px; }
  h2 { font-size: 21px; font-weight: 700; letter-spacing: 0.1px; margin: 28px 0 10px; }
  .sub { color: var(--muted); font-size: 15px; margin-top: 3px; }

  /* ---- Bottom Nav (iOS Tab Bar) ---- */
  #nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: space-around;
    background: var(--navbg);
    backdrop-filter: blur(20px) saturate(1.8); -webkit-backdrop-filter: blur(20px) saturate(1.8);
    border-top: 0.5px solid var(--sep);
    padding: 8px 6px calc(env(safe-area-inset-bottom) + 8px);
    z-index: 50;
  }
  .navbtn {
    background: none; border: none; color: var(--muted);
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 10px; font-weight: 600; font-family: inherit;
    flex: 1 1 0; max-width: 68px; padding: 3px 0; cursor: pointer;
    transition: color .15s;
  }
  .navbtn svg { width: 24px; height: 24px; }
  .navbtn.on { color: var(--accent); }

  /* ---- Cards & Buttons ---- */
  .card {
    background: var(--card);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  }
  .btn {
    display: block; width: 100%; text-align: center;
    background: var(--accent);
    color: #fff; font-weight: 600; font-size: 17px; font-family: inherit;
    border: none; border-radius: var(--radius); padding: 15px; cursor: pointer;
    transition: opacity .1s;
  }
  .btn:active { opacity: 0.75; }
  .btn.ghost { background: var(--fill2); color: var(--accent); }
  .btn.danger { background: none; color: var(--danger); }
  .btn.sm { padding: 11px; font-size: 15px; border-radius: 12px; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  input, select {
    width: 100%; background: var(--fill); border: none;
    color: var(--text); font-size: 16px; font-family: inherit;
    border-radius: 11px; padding: 13px 14px; outline: none;
  }
  input:focus { box-shadow: 0 0 0 2px var(--accent); }
  input::placeholder { color: var(--muted); }
  label.fld {
    display: block; font-size: 13px; font-weight: 600; color: var(--muted);
    margin: 14px 4px 6px; text-transform: uppercase; letter-spacing: .4px;
  }

  /* ---- Chips / Badges ---- */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 8px 14px; border-radius: 99px; font-size: 14px; font-weight: 600;
    background: var(--fill); border: none; color: var(--text);
    cursor: pointer; font-family: inherit;
  }
  .chip.on { background: var(--accent); color: #fff; }
  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 99px;
    font-size: 11px; font-weight: 700; letter-spacing: .2px;
  }
  .setpill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--fill);
    border-radius: 10px; padding: 7px 11px; font-size: 14px; font-weight: 600;
  }
  .setpill b { color: var(--accent); }
  .setpill .x { color: var(--muted); font-weight: 400; cursor: pointer; padding: 0 2px; }

  /* ---- Segmented Control (iOS) ---- */
  .seg {
    display: flex; background: var(--fill2); border-radius: 10px; padding: 2px; margin-bottom: 16px;
  }
  .seg button {
    flex: 1; border: none; background: none; color: var(--text);
    font-size: 14px; font-weight: 600; font-family: inherit;
    padding: 8px; border-radius: 8px; cursor: pointer;
  }
  .seg button.on { background: var(--card); box-shadow: 0 1px 4px rgba(0,0,0,0.12); }

  /* ---- Stats ---- */
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 18px 0; }
  .stat {
    background: var(--card); border-radius: var(--radius);
    padding: 14px 10px; text-align: center;
  }
  .stat .v { font-size: 22px; font-weight: 800; color: var(--accent); }
  .stat .l { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 3px; }

  .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 15px; line-height: 1.6; }
  .empty .big { font-size: 44px; display: block; margin-bottom: 10px; }

  .listitem { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .iconbtn {
    background: var(--fill); border: none; color: var(--muted);
    width: 36px; height: 36px; border-radius: 10px; font-size: 15px; cursor: pointer;
    flex-shrink: 0; font-family: inherit;
  }
  .iconbtn:disabled { opacity: 0.3; }
  .hint { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .hint b { color: var(--text); }

  .banner { background: var(--accent); color: #fff; }
  .banner .sub { color: rgba(255,255,255,0.85); }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .back { background: none; border: none; color: var(--accent); font-size: 17px; font-weight: 500; font-family: inherit; cursor: pointer; padding: 6px 0; }

  /* ---- Balken (Muskelgruppen) ---- */
  .bar-bg { background: var(--fill); border-radius: 6px; height: 10px; overflow: hidden; margin-top: 6px; }
  .bar-fill { height: 100%; border-radius: 6px; }

  /* ---- Kalender ---- */
  .cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
  .cal .dh { font-size: 11px; font-weight: 700; color: var(--muted); padding: 4px 0; }
  .cal .d { height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 14px; font-weight: 500; margin: 0 auto; width: 34px; }
  .cal .d.has { background: var(--accent); color: #fff; font-weight: 700; cursor: pointer; }
  .cal .d.today { box-shadow: inset 0 0 0 2px var(--accent); }
  .cal .d.today.has { box-shadow: none; }

  /* ---- Supersatz ---- */
  .ss-card { border-left: 3px solid var(--orange); }
  .ss-badge { background: var(--fill); color: var(--orange); }
  .ss-toggle { text-align: center; margin: -6px 0 6px; }

  /* ---- Pausen-Timer ---- */
  #restbar {
    display: none; position: fixed; left: 16px; right: 16px;
    bottom: calc(env(safe-area-inset-bottom) + 82px);
    background: var(--accent); color: #fff;
    border-radius: 16px; padding: 13px 18px;
    align-items: center; justify-content: space-between;
    font-size: 16px; font-weight: 600; z-index: 60;
    box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    max-width: 528px; margin: 0 auto;
  }
  #restbar b { font-size: 21px; font-variant-numeric: tabular-nums; }
  #restbar button {
    background: rgba(255,255,255,0.22); border: none; color: #fff;
    font-family: inherit; font-size: 14px; font-weight: 700;
    border-radius: 9px; padding: 7px 13px; cursor: pointer;
  }
</style>
</head>
<body>
<main id="view"></main>
<div id="restbar"><span>⏱ Satzpause &nbsp;<b id="resttime">1:30</b></span><button onclick="stopRest()">Überspringen</button></div>
<nav id="nav">
  <button class="navbtn" data-tab="home" onclick="go('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
    Start
  </button>
  <button class="navbtn" data-tab="plans" onclick="go('plans')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3 6h.01M3 12h.01M3 18h.01"/></svg>
    Pläne
  </button>
  <button class="navbtn" data-tab="history" onclick="go('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    Verlauf
  </button>
  <button class="navbtn" data-tab="analysis" onclick="go('analysis')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M4 16l5-5 4 3 7-8"/><path d="M16 6h4v4"/></svg>
    Analyse
  </button>
  <button class="navbtn" data-tab="orm" onclick="go('orm')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8M12 17v4M7 4h10v6a5 5 0 0 1-10 0V4z"/><path d="M7 6H4a3 3 0 0 0 3 5M17 6h3a3 3 0 0 1-3 5"/></svg>
    1RM
  </button>
  <button class="navbtn" data-tab="weight" onclick="go('weight')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 8a4 4 0 0 1 8 0l-1.5 3h-5L8 8z"/></svg>
    Gewicht
  </button>
</nav>

<script>
'use strict';

/* ================= Daten ================= */
const KEY = 'gymlog_v1';
const MUSCLES = [
  ['Brust', '#ff3b30'], ['Rücken', '#007aff'], ['Schultern', '#ff9500'],
  ['Bizeps', '#34c759'], ['Trizeps', '#5ac8fa'], ['Beine', '#af52de'],
  ['Po', '#ff2d55'], ['Bauch', '#ff9f0a'], ['Waden', '#bf5af2'], ['Cardio', '#32ade6']
];
const mColor = m => (MUSCLES.find(x => x[0] === m) || [0, '#007aff'])[1];

/* Deine Pläne aus der Numbers-Tabelle „Kraftplan Werte" */
const DEFAULT_PLANS = [
  { name: 'Kraft + Schnelligkeit A', ex: [
    ['Rückenstrecker', ['Rücken'], 3], ['Bauchlage MB Wurf', ['Rücken', 'Schultern'], 3],
    ['Kniebeuge', ['Beine', 'Po'], 3], ['Box Jumps', ['Beine'], 3],
    ['Bankdrücken', ['Brust', 'Trizeps'], 3], ['Liegestütz explosiv', ['Brust', 'Trizeps'], 3],
    ['Bridge', ['Po'], 3], ['Kettlebell Swing', ['Po', 'Rücken'], 3]] },
  { name: 'Kraft + Schnelligkeit B', ex: [
    ['Rudern', ['Rücken', 'Bizeps'], 3], ['Schrägbankdrücken', ['Brust', 'Schultern'], 3],
    ['Kreuzheben', ['Rücken', 'Beine', 'Po'], 3], ['Beinpresse exzentrisch', ['Beine'], 3],
    ['Klimmzüge', ['Rücken', 'Bizeps'], 3], ['Dips', ['Trizeps', 'Brust'], 3],
    ['Half Kneeling Landmine', ['Bauch', 'Schultern'], 3], ['Bizeps/Trizeps', ['Bizeps', 'Trizeps'], 3],
    ['Kurzhantel Bankdrücken explosiv', ['Brust'], 3]] },
  { name: 'Kraftplan A', ex: [
    ['Lat Zug', ['Rücken', 'Bizeps'], 3], ['Butterfly', ['Brust'], 3],
    ['Kniebeuge', ['Beine', 'Po'], 3], ['Ausfallschritte', ['Beine', 'Po'], 3],
    ['Bankdrücken', ['Brust', 'Trizeps'], 3], ['Bridge', ['Po'], 3]] },
  { name: 'Kraftplan B', ex: [
    ['Rudern', ['Rücken', 'Bizeps'], 3], ['Schrägbankdrücken', ['Brust', 'Schultern'], 3],
    ['Split Squat', ['Beine', 'Po'], 3], ['Wadenheben', ['Waden'], 3],
    ['Kreuzheben', ['Rücken', 'Beine', 'Po'], 3], ['Dips', ['Trizeps', 'Brust'], 3]] },
  { name: 'Kraftplan C', ex: [
    ['Klimmzug', ['Rücken', 'Bizeps'], 3], ['Reverse Flys', ['Schultern', 'Rücken'], 3],
    ['Standwaage', ['Rücken', 'Beine'], 3], ['Front Kniebeuge', ['Beine'], 3],
    ['Pull Over', ['Brust', 'Rücken'], 3], ['Rückenstrecker', ['Rücken'], 3]] },
  { name: 'Max SK A', ex: [
    ['Rückenstrecker schräg', ['Rücken'], 3], ['Bauchlage MB Wurf Überkopf', ['Rücken', 'Schultern'], 3],
    ['Kniebeuge', ['Beine', 'Po'], 3], ['Box Jumps', ['Beine'], 3],
    ['Bankdrücken', ['Brust', 'Trizeps'], 3], ['Liegestütz explosiv', ['Brust', 'Trizeps'], 3],
    ['Bridge', ['Po'], 3], ['Kettlebell Swing', ['Po', 'Rücken'], 3]] },
  { name: 'Max SK B', ex: [
    ['Rudern', ['Rücken', 'Bizeps'], 3], ['Schrägbankdrücken', ['Brust', 'Schultern'], 3],
    ['Stoßen mit Medizinball', ['Schultern', 'Bauch'], 3], ['Kreuzheben', ['Rücken', 'Beine', 'Po'], 3],
    ['Hürdensprünge', ['Beine'], 3], ['Half Kneeling Landmine Rotation explosiv', ['Bauch', 'Schultern'], 3],
    ['Beinpresse exzentrisch', ['Beine'], 3], ['Klimmzüge Obergriff', ['Rücken', 'Bizeps'], 3],
    ['Dips', ['Trizeps', 'Brust'], 3]] },
  { name: 'Schnellkraft A', ex: [
    ['Kniebeugen Sprünge', ['Beine', 'Po'], 4], ['Kettlebell Swing', ['Po', 'Rücken'], 4],
    ['Niedersprünge', ['Beine'], 3], ['Medizinball schleudern', ['Bauch', 'Schultern'], 4],
    ['Front Raise Catch', ['Schultern'], 3]] },
  { name: 'Schnellkraft B', ex: [
    ['Aufsteiger Kurzhantel', ['Beine', 'Po'], 4], ['Bankdrücken explosiv', ['Brust'], 4],
    ['Kreuzheben Schnellkraft', ['Rücken', 'Beine'], 4], ['Hürdensprünge', ['Beine'], 4],
    ['Medball Overhead Slam', ['Bauch', 'Schultern'], 4]] },
  { name: 'MKraft Erhalt & Plyo', ex: [
    ['Rückenstrecker schräg', ['Rücken'], 3], ['Bauchlage MB Wurf Überkopf', ['Rücken', 'Schultern'], 3],
    ['Kniebeuge', ['Beine', 'Po'], 3], ['Landmine Split Jerk', ['Schultern', 'Beine'], 3],
    ['Schulterdrücken', ['Schultern', 'Trizeps'], 3], ['Liegestütz explosiv Theraband', ['Brust', 'Trizeps'], 3],
    ['Bridge', ['Po'], 3], ['Kettlebell Swing', ['Po', 'Rücken'], 3]] }
];

let S = load();
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY));
    if (d) {
      if (!d.orms) d.orms = [];
      if (!d.settings) d.settings = { rest: 90 };
      if (!d.settings.theme) d.settings.theme = 'auto';
      return d;
    }
  } catch (e) {}
  return { plans: [], workouts: [], weights: [], orms: [], settings: { rest: 90, theme: 'auto' }, active: null };
}
function save() { localStorage.setItem(KEY, JSON.stringify(S)); }
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let cur = 'home';
let editPlan = null;   // Arbeitskopie beim Plan-Bearbeiten
let selMuscles = ['Brust'];
let openHist = null;
let calMonth = null;
let editExIdx = null;        // Index der gerade inline bearbeiteten Übung
let editExName = '';         // Entwurf: Name
let editExSets = 3;          // Entwurf: Sätze
let editExMuscles = [];      // Entwurf: Muskelgruppen
let woSetType = {};          // Satztyp pro Übung im Training: {index: 'normal'|'warmup'|'drop'}
let editSet = null;          // gerade bearbeiteter Satz: {ei, si}
let editReps = '', editKg = '', editRpe = '', editMins = '', editSetType = 'normal';
let editScope = 'active';    // Satz-Editor wirkt auf: 'active' (Training) | 'hist' (Verlauf)
let editWid = null;          // Workout-ID beim Bearbeiten im Verlauf
let histEdit = null;         // Workout-ID, das gerade im Verlauf bearbeitet wird
let woEditIdx = null;        // Index der im Training bearbeiteten Übung (Name/Muskeln/Ziel)
let suggList = [];           // aktuelle Übungs-Vorschläge (für pickSuggest per Index)
let selAnaEx = null;         // gewählte Übung in der Übungs-Analyse
let anaExNames = [];

/* ================= Vorlagen-Pläne ================= */
function loadTemplates(silent) {
  let added = 0;
  for (const t of DEFAULT_PLANS) {
    if (S.plans.some(p => p.name.toLowerCase() === t.name.toLowerCase())) continue;
    S.plans.push({
      id: uid(), name: t.name,
      exercises: t.ex.map(([name, muscles, target]) => ({ name, muscles: [...muscles], target }))
    });
    added++;
  }
  if (added) save();
  if (!silent) alert(added ? added + ' Pläne hinzugefügt ✓' : 'Alle Vorlagen-Pläne sind schon vorhanden.');
  render();
}

/* ================= Helfer ================= */
/* Übungen können mehrere Muskelgruppen haben; alte Einträge hatten nur e.muscle */
const musclesOf = e => e.muscles || (e.muscle ? [e.muscle] : []);
const isCardio = e => musclesOf(e).includes('Cardio');
const badges = e => musclesOf(e).map(badge).join(' ');
const isWarmup = s => s.type === 'warmup';
const setMark = s => s.type === 'warmup' ? 'W·' : s.type === 'drop' ? 'D·' : '';
const fmtSet = s => s.mins != null ? `${s.mins} min` : `${setMark(s)}${s.reps}×${s.weight}kg${s.rpe ? ' @' + s.rpe : ''}`;

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('de-DE', { weekday: 'short', day: 'numeric', month: 'short' });
}
function badge(m) {
  const c = mColor(m);
  return `<span class="badge" style="background:${c}1f;color:${c}">${esc(m)}</span>`;
}
function lastSetsFor(name) {
  for (const w of [...S.workouts].sort((a, b) => b.date.localeCompare(a.date))) {
    const e = w.entries.find(e => e.name.toLowerCase() === name.toLowerCase());
    if (e && e.sets.length) return e.sets;
  }
  return null;
}
/* Alle bekannten Übungen, zuletzt verwendete zuerst (Workouts rückwärts, dann Pläne) */
function recentExercises() {
  const seen = new Map();
  const add = name => { const k = name.toLowerCase(); if (!seen.has(k)) seen.set(k, name); };
  for (const w of [...S.workouts].sort((a, b) => b.date.localeCompare(a.date)))
    for (const e of w.entries) add(e.name);
  for (const p of S.plans) for (const e of p.exercises) add(e.name);
  return [...seen.values()];
}
/* Sätze-Ziel einer Übung aus den Plänen übernehmen */
function targetFor(name) {
  const k = name.toLowerCase();
  for (const p of S.plans) {
    const e = p.exercises.find(e => e.name.toLowerCase() === k);
    if (e && e.target) return e.target;
  }
  return null;
}
function volume(w) {
  // Aufwärmsätze zählen nicht zum Trainingsvolumen
  return w.entries.reduce((s, e) => s + e.sets.reduce((t, x) => t + (x.mins != null || isWarmup(x) ? 0 : x.reps * x.weight), 0), 0);
}
function setCount(w) {
  return w.entries.reduce((s, e) => s + e.sets.length, 0);
}

/* ================= Navigation ================= */
function go(tab) {
  cur = tab;
  if (tab !== 'planEdit') { editPlan = null; editExIdx = null; }
  if (tab !== 'history') histEdit = null;
  editSet = null;
  woEditIdx = null;
  render();
  scrollTo(0, 0);
}

function render() {
  document.querySelectorAll('.navbtn').forEach(b => {
    b.classList.toggle('on', b.dataset.tab === cur);
  });
  const v = document.getElementById('view');
  if (cur === 'home') v.innerHTML = rHome();
  else if (cur === 'plans') v.innerHTML = rPlans();
  else if (cur === 'planEdit') v.innerHTML = editPlan ? rPlanEdit() : rPlans();
  else if (cur === 'workout') v.innerHTML = rWorkout();
  else if (cur === 'history') v.innerHTML = rHistory();
  else if (cur === 'analysis') v.innerHTML = rAnalysis();
  else if (cur === 'orm') v.innerHTML = rOrm();
  else if (cur === 'weight') v.innerHTML = rWeight();
  // Übungs-Vorschläge unter den Namensfeldern befüllen
  if (cur === 'planEdit' && editPlan) filterSuggest('plan');
  else if (cur === 'workout' && S.active) filterSuggest('wo');
}

/* ================= Start ================= */
function rHome() {
  const now = new Date();
  const monday = new Date(now); monday.setDate(now.getDate() - ((now.getDay() + 6) % 7)); monday.setHours(0,0,0,0);
  const week = S.workouts.filter(w => new Date(w.date) >= monday).length;
  const month = S.workouts.filter(w => new Date(w.date).getMonth() === now.getMonth() && new Date(w.date).getFullYear() === now.getFullYear()).length;
  const lastW = S.weights.length ? S.weights[S.weights.length - 1].kg + ' kg' : '–';

  let h = `<h1>Trainingstracker</h1>
    <div class="sub">${now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' })}</div>
    <div class="stats">
      <div class="stat"><div class="v">${week}</div><div class="l">diese Woche</div></div>
      <div class="stat"><div class="v">${month}</div><div class="l">diesen Monat</div></div>
      <div class="stat"><div class="v">${lastW}</div><div class="l">Körpergewicht</div></div>
    </div>`;

  if (S.active) {
    h += `<div class="card banner" onclick="go('workout')" style="cursor:pointer">
      <div class="listitem">
        <div><b style="font-size:16px">▶︎ Training läuft</b>
        <div class="sub">${esc(S.active.planName)} · ${setCount(S.active)} Sätze – tippen zum Fortsetzen</div></div>
      </div></div>`;
  } else {
    h += `<h2>Training starten</h2>`;
    if (S.plans.length === 0) {
      h += `<div class="card"><div class="sub" style="margin-bottom:12px">Du hast noch keinen Trainingsplan. Erstelle zuerst einen – oder starte einfach frei drauflos.</div>
        <button class="btn sm ghost" onclick="newPlan()">+ Trainingsplan erstellen</button></div>`;
    }
    for (const p of S.plans) {
      const muscles = [...new Set(p.exercises.flatMap(musclesOf))];
      h += `<div class="card" onclick="startWorkout('${p.id}')" style="cursor:pointer">
        <div class="listitem">
          <div><b style="font-size:16px">${esc(p.name)}</b>
            <div style="margin-top:7px;display:flex;gap:5px;flex-wrap:wrap">${muscles.map(badge).join('')}</div>
            <div class="sub">${p.exercises.length} Übungen</div></div>
          <div style="color:var(--accent);font-size:22px">▶︎</div>
        </div></div>`;
    }
    if (S.workouts.length) {
      const lw = S.workouts[S.workouts.length - 1];
      h += `<div class="card" onclick="repeatLast()" style="cursor:pointer;margin-top:6px">
        <div class="listitem">
          <div><b style="font-size:16px">↻ Letztes Training wiederholen</b>
            <div class="sub">${esc(lw.planName)} · ${fmtDate(lw.date)} · ${lw.entries.length} Übungen</div></div>
          <div style="color:var(--accent);font-size:22px">▶︎</div>
        </div></div>`;
    }
    h += `<button class="btn ghost sm" style="margin-top:6px" onclick="startWorkout(null)">Freies Training (ohne Plan)</button>`;
  }

  h += `<h2>Einstellungen & Daten</h2>
    <div class="card" style="padding:12px 16px;margin-bottom:12px">
      <div class="listitem" style="margin-bottom:10px"><b style="font-size:15px">Design</b></div>
      <div class="seg" style="margin-bottom:4px">
        <button class="${S.settings.theme === 'auto' ? 'on' : ''}" onclick="setTheme('auto')">Auto</button>
        <button class="${S.settings.theme === 'light' ? 'on' : ''}" onclick="setTheme('light')">Hell</button>
        <button class="${S.settings.theme === 'dark' ? 'on' : ''}" onclick="setTheme('dark')">Dunkel</button>
      </div>
    </div>
    <div class="card" style="padding:8px 16px">
      <div class="listitem" style="padding:10px 0;border-bottom:0.5px solid var(--sep);cursor:pointer" onclick="loadTemplates(false)">
        <div><b style="font-size:15px">Meine Trainingspläne laden</b><div class="hint" style="margin-top:2px">Fügt die 10 Pläne aus deiner Numbers-Tabelle hinzu</div></div>
        <div style="color:var(--muted)">›</div>
      </div>
      <div class="listitem" style="padding:10px 0;border-bottom:0.5px solid var(--sep);cursor:pointer" onclick="exportData()">
        <div><b style="font-size:15px">Daten exportieren</b><div class="hint" style="margin-top:2px">Backup-Datei sichern (z. B. in iCloud)</div></div>
        <div style="color:var(--muted)">›</div>
      </div>
      <div class="listitem" style="padding:10px 0;cursor:pointer" onclick="document.getElementById('imp').click()">
        <div><b style="font-size:15px">Daten importieren</b><div class="hint" style="margin-top:2px">Backup wiederherstellen</div></div>
        <div style="color:var(--muted)">›</div>
      </div>
    </div>
    <input type="file" id="imp" accept=".json,application/json" style="display:none" onchange="importData(event)">`;
  return h;
}

/* ================= Design (Hell/Dunkel) ================= */
function applyTheme() {
  const t = S.settings.theme || 'auto';
  document.documentElement.classList.toggle('light', t === 'light');
  document.documentElement.classList.toggle('dark', t === 'dark');
}
function setTheme(t) {
  S.settings.theme = t;
  save(); applyTheme(); render();
}

/* ================= Backup ================= */
function exportData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'trainingstracker-backup-' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
}
function importData(ev) {
  const f = ev.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const d = JSON.parse(r.result);
      if (!d || !Array.isArray(d.plans) || !Array.isArray(d.workouts)) throw new Error('invalid');
      if (!confirm(`Backup mit ${d.workouts.length} Trainings und ${d.plans.length} Plänen gefunden. Aktuelle Daten damit ersetzen?`)) return;
      if (!d.orms) d.orms = [];
      if (!d.weights) d.weights = [];
      if (!d.settings) d.settings = { rest: 90, theme: 'auto' };
      S = d; save(); applyTheme(); render();
      alert('Import erfolgreich! ✓');
    } catch (e) {
      alert('Das ist keine gültige Backup-Datei.');
    }
  };
  r.readAsText(f);
  ev.target.value = '';
}

/* ================= Pläne ================= */
function rPlans() {
  let h = `<h1>Trainingspläne</h1><div class="sub">Stelle deine Workouts zusammen</div><div style="height:18px"></div>`;
  if (!S.plans.length) {
    h += `<div class="empty"><span class="big">📋</span>Noch keine Pläne.<br>Erstelle deinen ersten Trainingsplan!</div>`;
  }
  for (const p of S.plans) {
    const muscles = [...new Set(p.exercises.flatMap(musclesOf))];
    h += `<div class="card"><div class="listitem">
      <div style="flex:1;cursor:pointer" onclick="openPlan('${p.id}')">
        <b style="font-size:16px">${esc(p.name)}</b>
        <div style="margin-top:7px;display:flex;gap:5px;flex-wrap:wrap">${muscles.map(badge).join('')}</div>
        <div class="sub">${p.exercises.length} Übungen · tippen zum Bearbeiten</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="iconbtn" title="Duplizieren" onclick="dupPlan('${p.id}')">⧉</button>
        <button class="iconbtn" onclick="delPlan('${p.id}')">🗑</button>
      </div>
    </div></div>`;
  }
  h += `<button class="btn" style="margin-top:10px" onclick="newPlan()">+ Neuer Plan</button>`;
  return h;
}

function newPlan() {
  editPlan = { id: uid(), name: '', exercises: [], isNew: true };
  editExIdx = null;
  cur = 'planEdit'; render(); scrollTo(0, 0);
}
function openPlan(id) {
  const p = S.plans.find(p => p.id === id);
  editPlan = JSON.parse(JSON.stringify(p));
  editExIdx = null;
  cur = 'planEdit'; render(); scrollTo(0, 0);
}
function delPlan(id) {
  const p = S.plans.find(p => p.id === id);
  if (confirm(`Plan „${p.name}" wirklich löschen?`)) {
    S.plans = S.plans.filter(p => p.id !== id);
    save(); render();
  }
}
function dupPlan(id) {
  const p = S.plans.find(p => p.id === id);
  if (!p) return;
  const copy = JSON.parse(JSON.stringify(p));
  copy.id = uid();
  copy.name = p.name + ' (Kopie)';
  S.plans.push(copy);
  save(); render();
}

function rPlanEdit() {
  const p = editPlan;
  let h = `<div class="topbar"><button class="back" onclick="go('plans')">‹ Zurück</button></div>
    <h1>${p.isNew ? 'Neuer Plan' : 'Plan bearbeiten'}</h1>
    <label class="fld">Name des Plans</label>
    <input id="plan-name" placeholder="z. B. Push Day, Oberkörper …" value="${esc(p.name)}">
    <h2>Übungen</h2>`;
  if (!p.exercises.length) h += `<div class="sub" style="margin-bottom:12px">Füge unten Übungen hinzu. Mit ↑ ↓ änderst du die Reihenfolge.</div>`;
  p.exercises.forEach((e, i) => {
    if (editExIdx === i) {
      h += `<div class="card" style="padding:14px 16px">
        <label class="fld" style="margin-top:0">Name &amp; Sätze</label>
        <div class="row">
          <input id="edit-ex-name" value="${esc(editExName)}" placeholder="z. B. Bankdrücken">
          <input id="edit-ex-sets" type="number" inputmode="numeric" min="1" max="10" value="${esc(editExSets)}" style="flex:0 0 76px" title="Sätze">
        </div>
        <label class="fld">Muskelgruppen (mehrere möglich)</label>
        <div class="chips">${MUSCLES.map(([m]) =>
          `<button class="chip ${editExMuscles.includes(m) ? 'on' : ''}" onclick="pickEditMuscle('${m}')">${m}</button>`).join('')}
        </div>
        <div class="row" style="margin-top:14px">
          <button class="btn sm ghost" onclick="cancelExEdit()">Abbrechen</button>
          <button class="btn sm" onclick="saveExEdit()">Speichern</button>
        </div>
      </div>`;
    } else {
      h += `<div class="card" style="padding:13px 16px"><div class="listitem">
        <div style="flex:1;cursor:pointer" onclick="startExEdit(${i})"><b>${esc(e.name)}</b>
          <div style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap;align-items:center">${badges(e)}
            <span class="hint" style="display:inline;margin:0">· ${e.target || 3} Sätze · tippen zum Bearbeiten</span></div></div>
        <div style="display:flex;gap:6px">
          <button class="iconbtn" onclick="startExEdit(${i})">✎</button>
          <button class="iconbtn" ${i === 0 ? 'disabled' : ''} onclick="moveEx(${i},-1)">↑</button>
          <button class="iconbtn" ${i === p.exercises.length - 1 ? 'disabled' : ''} onclick="moveEx(${i},1)">↓</button>
          <button class="iconbtn" onclick="rmPlanEx(${i})">✕</button>
        </div>
      </div></div>`;
    }
    if (i < p.exercises.length - 1) {
      h += `<div class="ss-toggle"><button class="chip ${e.ss ? 'on' : ''}" style="padding:5px 12px;font-size:12px" onclick="toggleSS(${i})">⇄ Supersatz</button></div>`;
    }
  });
  h += `<div class="card" style="margin-top:14px">
    <label class="fld" style="margin-top:0">Neue Übung</label>
    <div class="row">
      <input id="ex-name" placeholder="z. B. Bankdrücken" value="${esc(p._draft || '')}" oninput="filterSuggest('plan')">
      <input id="ex-sets" type="number" inputmode="numeric" min="1" max="10" value="${esc(p._draftSets || 3)}" style="flex:0 0 76px" title="Sätze">
    </div>
    <div class="hint" style="margin:4px 4px 0">Rechts: Anzahl der Sätze (Ziel)</div>
    <div class="chips" id="sugg-plan" style="margin-top:8px"></div>
    <label class="fld">Muskelgruppen (mehrere möglich)</label>
    <div class="chips">${MUSCLES.map(([m]) =>
      `<button class="chip ${selMuscles.includes(m) ? 'on' : ''}" onclick="pickMuscle('${m}')">${m}</button>`).join('')}
    </div>
    <button class="btn sm ghost" style="margin-top:14px" onclick="addPlanEx()">+ Übung hinzufügen</button>
  </div>
  <button class="btn" style="margin-top:8px" onclick="savePlan()">Plan speichern</button>`;
  return h;
}
function moveEx(i, d) {
  syncPlanName();
  editExIdx = null;
  const j = i + d;
  const a = editPlan.exercises;
  if (j < 0 || j >= a.length) return;
  [a[i], a[j]] = [a[j], a[i]];
  render();
}
function toggleSS(i) {
  syncPlanName();
  editPlan.exercises[i].ss = !editPlan.exercises[i].ss;
  render();
}
function toggleSel(m) {
  const i = selMuscles.indexOf(m);
  if (i >= 0) selMuscles.splice(i, 1);
  else selMuscles.push(m);
}
function pickMuscle(m) {
  syncPlanName();
  toggleSel(m);
  render();
}
function syncPlanName() {
  const el = document.getElementById('plan-name');
  if (el && editPlan) editPlan.name = el.value;
  const ex = document.getElementById('ex-name');
  if (ex && editPlan) editPlan._draft = ex.value;
  const st = document.getElementById('ex-sets');
  if (st && editPlan) editPlan._draftSets = st.value;
  // Inline-Bearbeitung einer vorhandenen Übung mitsichern
  const en = document.getElementById('edit-ex-name');
  if (en) editExName = en.value;
  const es = document.getElementById('edit-ex-sets');
  if (es) editExSets = es.value;
}

/* ===== Übungs-Vorschläge (automatische Bibliothek) =====
   Befüllt die Vorschlagsbox unter dem Namensfeld, ohne die Seite neu zu rendern
   (so bleibt der Fokus beim Tippen erhalten). ctx: 'plan' | 'wo' */
function filterSuggest(ctx) {
  const inputId = ctx === 'plan' ? 'ex-name' : 'wo-ex-name';
  const boxId = ctx === 'plan' ? 'sugg-plan' : 'sugg-wo';
  const el = document.getElementById(inputId);
  const box = document.getElementById(boxId);
  if (!el || !box) return;
  const q = el.value.trim().toLowerCase();
  const existing = (ctx === 'plan'
    ? (editPlan ? editPlan.exercises : [])
    : (S.active ? S.active.entries : [])).map(e => e.name.toLowerCase());
  suggList = recentExercises().filter(n => {
    const k = n.toLowerCase();
    return !existing.includes(k) && k !== q && (!q || k.includes(q));
  }).slice(0, 8);
  box.innerHTML = suggList.map((n, i) =>
    `<button class="chip" style="padding:6px 12px;font-size:13px" onclick="pickSuggest(${i},'${ctx}')">${esc(n)}</button>`).join('');
}
function pickSuggest(i, ctx) {
  const name = suggList[i];
  if (!name) return;
  const ms = musclesFor(name);
  if (ms.length) selMuscles = [...ms];
  if (ctx === 'plan') {
    syncPlanName();
    editPlan._draft = name;
    const t = targetFor(name);
    if (t) editPlan._draftSets = t;
    render();
  } else {
    woDraft = name;
    render();
    const el = document.getElementById('wo-ex-name');
    if (el) el.value = name;
  }
}

/* Vorhandene Übung im Plan bearbeiten (Name, Sätze, Muskelgruppen) */
function startExEdit(i) {
  syncPlanName();
  const e = editPlan.exercises[i];
  editExIdx = i;
  editExName = e.name;
  editExSets = e.target || 3;
  editExMuscles = [...musclesOf(e)];
  render();
  const el = document.getElementById('edit-ex-name');
  if (el) el.focus();
}
function pickEditMuscle(m) {
  syncPlanName();
  const i = editExMuscles.indexOf(m);
  if (i >= 0) editExMuscles.splice(i, 1);
  else editExMuscles.push(m);
  render();
}
function saveExEdit() {
  syncPlanName();
  const name = (editExName || '').trim();
  if (!name) { alert('Bitte gib der Übung einen Namen.'); return; }
  if (!editExMuscles.length) { alert('Bitte wähle mindestens eine Muskelgruppe.'); return; }
  const e = editPlan.exercises[editExIdx];
  e.name = name;
  e.muscles = [...editExMuscles];
  e.target = Math.max(1, Math.min(10, parseInt(editExSets, 10) || 3));
  delete e.muscle; // alte Einzel-Eigenschaft entfernen
  editExIdx = null;
  render();
}
function cancelExEdit() {
  editExIdx = null;
  render();
}
function addPlanEx() {
  syncPlanName();
  const name = (editPlan._draft || '').trim();
  if (!name) { alert('Bitte gib der Übung einen Namen.'); return; }
  if (!selMuscles.length) { alert('Bitte wähle mindestens eine Muskelgruppe.'); return; }
  const target = Math.max(1, Math.min(10, parseInt(editPlan._draftSets, 10) || 3));
  editPlan.exercises.push({ name, muscles: [...selMuscles], target });
  editPlan._draft = '';
  render();
  document.getElementById('ex-name').focus();
}
function rmPlanEx(i) {
  syncPlanName();
  editExIdx = null;
  editPlan.exercises.splice(i, 1);
  render();
}
function savePlan() {
  syncPlanName();
  if (!editPlan.name.trim()) { alert('Bitte gib dem Plan einen Namen.'); return; }
  if (!editPlan.exercises.length) { alert('Füge mindestens eine Übung hinzu.'); return; }
  delete editPlan._draft;
  delete editPlan._draftSets;
  const wasNew = editPlan.isNew; delete editPlan.isNew;
  if (wasNew) S.plans.push(editPlan);
  else S.plans = S.plans.map(p => p.id === editPlan.id ? editPlan : p);
  save(); go('plans');
}

/* ================= Workout ================= */
function startWorkout(planId) {
  if (S.active && !confirm('Es läuft bereits ein Training. Neues starten und das alte verwerfen?')) return;
  const p = planId ? S.plans.find(p => p.id === planId) : null;
  woSetType = {}; editSet = null; woEditIdx = null;
  S.active = {
    planName: p ? p.name : 'Freies Training',
    start: new Date().toISOString(),
    entries: p ? p.exercises.map(e => ({ name: e.name, muscles: musclesOf(e), target: e.target, ss: e.ss, sets: [] })) : []
  };
  save(); go('workout');
}

function exBlock(i) {
  const w = S.active;
  if (woEditIdx === i) return woExEditPanel(i);
  const e = w.entries[i];
  const cardio = isCardio(e);
  const last = lastSetsFor(e.name);
  const lastHint = last ? `Letztes Mal: <b>${last.map(fmtSet).join(' · ')}</b>` : 'Erste Session mit dieser Übung 🎉';
  const ov = cardio ? null : overloadFor(e.name);

  // Satz-Pillen (antippen zum Bearbeiten, ✕ zum Löschen)
  const pills = e.sets.map((s, j) => {
    const c = s.type === 'warmup' ? 'var(--orange)' : s.type === 'drop' ? 'var(--accent2)' : 'var(--accent)';
    return `<span class="setpill" style="${s.type ? `box-shadow:inset 0 0 0 1.5px ${c}` : ''}">
      <span onclick="startSetEdit(${i},${j})" style="cursor:pointer">${j + 1}. &nbsp;<b>${fmtSet(s)}</b></span>
      <span class="x" onclick="rmSet(${i},${j})">✕</span></span>`;
  }).join('');

  // Eingabezeile bzw. Inline-Editor, wenn ein Satz dieser Übung bearbeitet wird
  let editing = editSet && editScope === 'active' && editSet.ei === i;
  let inputArea;
  if (editing) {
    inputArea = setEditPanel(i, cardio);
  } else if (cardio) {
    const prefillM = e.sets.length ? e.sets[e.sets.length - 1].mins : (last && last[last.length - 1].mins != null ? last[last.length - 1].mins : '');
    inputArea = `<div class="row" style="margin-top:12px">
      <input id="min-${i}" type="number" inputmode="decimal" placeholder="Minuten" step="0.5" min="0" value="${prefillM}">
      <button class="btn sm" style="flex:0 0 92px" onclick="addSet(${i})">+ Satz</button></div>`;
  } else {
    const prefillW = e.sets.length ? e.sets[e.sets.length - 1].weight : (last && last[last.length - 1].weight != null ? last[last.length - 1].weight : '');
    const t = woSetType[i] || 'normal';
    const typeSel = `<div class="chips" style="margin-top:10px;align-items:center">
      <span class="hint" style="display:inline;margin:0 2px">Satztyp:</span>
      ${[['normal', 'Normal'], ['warmup', 'Aufwärmen'], ['drop', 'Drop']].map(([v, l]) =>
        `<button class="chip ${t === v ? 'on' : ''}" style="padding:6px 12px;font-size:13px" onclick="setWoType(${i},'${v}')">${l}</button>`).join('')}
    </div>`;
    inputArea = `${typeSel}<div class="row" style="margin-top:8px">
      <input id="reps-${i}" type="number" inputmode="numeric" placeholder="Wdh." min="1">
      <input id="kg-${i}" type="number" inputmode="decimal" placeholder="kg" step="0.5" min="0" value="${prefillW}">
      <input id="rpe-${i}" type="number" inputmode="numeric" placeholder="RPE" min="1" max="10" step="1" style="flex:0 0 62px">
      <button class="btn sm" style="flex:0 0 84px" onclick="addSet(${i})">+ Satz</button></div>`;
  }

  return `<div class="listitem"><div style="flex:1;cursor:pointer" onclick="startWoExEdit(${i})"><b style="font-size:16px">${esc(e.name)} <span style="color:var(--muted);font-size:13px;font-weight:400">✎</span></b> &nbsp;${badges(e)}</div>
      <div style="display:flex;gap:6px">
        <button class="iconbtn" ${i === 0 ? 'disabled' : ''} onclick="moveWoEx(${i},-1)">↑</button>
        <button class="iconbtn" ${i === w.entries.length - 1 ? 'disabled' : ''} onclick="moveWoEx(${i},1)">↓</button>
        <button class="iconbtn" onclick="rmWoEx(${i})">✕</button>
      </div></div>
    <div class="hint">${e.target ? `Ziel: <b>${e.target} Sätze</b> · ` : ''}${lastHint}</div>
    ${ov && !editing ? `<div style="margin-top:8px"><button class="chip" style="padding:6px 12px;font-size:13px;color:var(--accent)" onclick="fillOverload(${i},${ov.reps},${ov.kg})">💡 Vorschlag: ${ov.reps}×${ov.kg} kg</button></div>` : ''}
    ${e.sets.length ? `<div class="chips" style="margin-top:10px">${pills}</div>` : ''}
    ${inputArea}`;
}

/* Inline-Editor für Name, Muskelgruppen & Sätze-Ziel einer Übung im Training */
function woExEditPanel(i) {
  return `<label class="fld" style="margin-top:0">Name &amp; Sätze-Ziel</label>
    <div class="row">
      <input id="wo-edit-name" value="${esc(editExName)}" placeholder="z. B. Bankdrücken">
      <input id="wo-edit-sets" type="number" inputmode="numeric" min="1" max="10" value="${esc(editExSets)}" style="flex:0 0 76px" title="Sätze-Ziel">
    </div>
    <label class="fld">Muskelgruppen (mehrere möglich)</label>

function addSet(i) {
  const e = S.active.entries[i];
  if (isCardio(e)) {
    const mins = parseFloat(document.getElementById(`min-${i}`).value);
    if (isNaN(mins) || mins <= 0) { alert('Bitte die Zeit in Minuten eingeben.'); return; }
    e.sets.push({ mins: Math.round(mins * 10) / 10 });
    save(); render();
    return; // nach Cardio kein Pausen-Timer
  }
  const reps = parseInt(document.getElementById(`reps-${i}`).value, 10);
  const kg = parseFloat(document.getElementById(`kg-${i}`).value);
  const rpeRaw = parseInt(document.getElementById(`rpe-${i}`).value, 10);
  if (!reps || reps < 1) { alert('Bitte Wiederholungen eingeben.'); return; }
  if (isNaN(kg) || kg < 0) { alert('Bitte Gewicht eingeben (0 für Eigengewicht).'); return; }
  const set = { reps, weight: kg };
  const type = woSetType[i] || 'normal';
  if (type !== 'normal') set.type = type;
  if (!isNaN(rpeRaw) && rpeRaw >= 1 && rpeRaw <= 10) set.rpe = rpeRaw;
  e.sets.push(set);
  save(); render();
  // Aufwärmsätze und der erste Teil eines Supersatzes lösen keinen Pausen-Timer aus
  const firstOfPair = e.ss && i + 1 < S.active.entries.length;
  if (!firstOfPair && type !== 'warmup') startRest();

/* Progressive-Overload-Vorschlag: bester Arbeitssatz vom letzten Mal,
   Wdh. < 12 -> +1 Wdh. bei gleichem Gewicht, sonst +2,5 kg und zurück auf 8 Wdh. */
function overloadFor(name) {
  const last = lastSetsFor(name);
  if (!last) return null;
  const work = last.filter(s => s.mins == null && !isWarmup(s));
  if (!work.length) return null;
  const top = work.reduce((a, b) => (b.weight > a.weight || (b.weight === a.weight && b.reps > a.reps)) ? b : a);
  if (top.weight <= 0) return null; // Eigengewicht: kein sinnvoller Gewichts-Vorschlag
  if (top.reps >= 12) return { reps: 8, kg: Math.round((top.weight + 2.5) * 10) / 10 };
  return { reps: top.reps + 1, kg: top.weight };
}
function fillOverload(i, reps, kg) {
  const r = document.getElementById(`reps-${i}`); if (r) r.value = reps;
  const k = document.getElementById(`kg-${i}`); if (k) k.value = kg;
}

/* ================= Pausen-Timer ================= */
let timer = null;
function setRest(v) {
  S.settings.rest = v;
  save(); render();
  if (!v) stopRest();
}
function startRest() {
  const dur = S.settings.rest || 0;
  if (!dur) return;
  stopRest();
  timer = { until: Date.now() + dur * 1000, iv: setInterval(tickRest, 250) };
  tickRest();
}
function tickRest() {
  if (!timer) return;
  const left = Math.ceil((timer.until - Date.now()) / 1000);
  if (left <= 0) { stopRest(); beep(); return; }
  const bar = document.getElementById('restbar');
  bar.style.display = 'flex';
  document.getElementById('resttime').textContent = Math.floor(left / 60) + ':' + String(left % 60).padStart(2, '0');
}
function stopRest() {
  if (timer) { clearInterval(timer.iv); timer = null; }
  const bar = document.getElementById('restbar');
  if (bar) bar.style.display = 'none';
}
function beep() {
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.25].forEach(t => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.25, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.18);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.2);
    });
  } catch (e) {}
}

/* ================= Verlauf & Kalender ================= */
function rCalendar() {
  const base = calMonth ? new Date(calMonth) : new Date();
  base.setDate(1);
  const y = base.getFullYear(), m = base.getMonth();
  const days = new Date(y, m + 1, 0).getDate();
  const start = (new Date(y, m, 1).getDay() + 6) % 7; // Mo = 0
  const byDay = new Map();
  for (const w of S.workouts) {
    const d = new Date(w.date);
    if (d.getFullYear() === y && d.getMonth() === m && !byDay.has(d.getDate())) byDay.set(d.getDate(), w.id);
  }
  const today = new Date();
  let cells = '';
  for (let i = 0; i < start; i++) cells += '<div></div>';
  for (let d = 1; d <= days; d++) {
    const id = byDay.get(d);
    const isToday = today.getFullYear() === y && today.getMonth() === m && today.getDate() === d;
    cells += `<div class="d ${id ? 'has' : ''} ${isToday ? 'today' : ''}" ${id ? `onclick="openFromCal('${id}')"` : ''}>${d}</div>`;
  }
  return `<div class="card">
    <div class="listitem" style="margin-bottom:10px">
      <button class="iconbtn" onclick="calNav(-1)">‹</button>
      <b style="font-size:16px">${base.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' })}</b>
      <button class="iconbtn" onclick="calNav(1)">›</button>
    </div>
    <div class="cal">${['Mo','Di','Mi','Do','Fr','Sa','So'].map(d => `<div class="dh">${d}</div>`).join('')}${cells}</div>
  </div>`;
}
function calNav(n) {
  const b = calMonth ? new Date(calMonth) : new Date();
  b.setDate(1);
  b.setMonth(b.getMonth() + n);
  calMonth = b.toISOString();
  render();
}
function openFromCal(id) {
  openHist = id;
  render();
  setTimeout(() => {
    const el = document.getElementById('w-' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 60);
}

let selAnaPlan = null;
let anaMode = 'plans';
/* Geschätztes 1RM nach Epley, RPE-korrigiert: hat ein Satz RPE, zählt die
   Wiederholungs-Reserve mit (RIR = 10 − RPE) – 8×80 @RPE 8 ist stärker als 8×80 @RPE 10. */
const e1rmAdj = s => s.weight * (1 + (s.reps + (s.rpe ? 10 - s.rpe : 0)) / 30);
const r1 = v => Math.round(v * 10) / 10;

function lineChart(vals, color) {
  const W = 320, H = 110, PL = 14, PR = 14, PT = 20, PB = 8;
  const mn = Math.min(...vals), mx = Math.max(...vals);
  const pad = Math.max((mx - mn) * 0.25, 0.5), lo = mn - pad, hi = mx + pad;
  const X = i => vals.length === 1 ? W / 2 : PL + i * (W - PL - PR) / (vals.length - 1);
  const Y = v => PT + (1 - (v - lo) / (hi - lo)) * (H - PT - PB);
  const line = vals.map((v, i) => `${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  const showLabel = i => vals.length <= 7 || i === 0 || i === vals.length - 1 || vals[i] === mx;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">
    <polyline points="${line}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${vals.map((v, i) => `<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3.5" fill="${color}"/>`).join('')}
    ${vals.map((v, i) => showLabel(i) ? `<text x="${X(i).toFixed(1)}" y="${(Y(v) - 9).toFixed(1)}" font-size="10" font-weight="700" fill="var(--muted)" text-anchor="${i === 0 ? 'start' : i === vals.length - 1 ? 'end' : 'middle'}">${r1(v)}</text>` : '').join('')}
  </svg>`;
}

function rAnalysis() {
  let h = `<h1>Analyse</h1><div class="sub">Deine Entwicklung im Blick</div><div style="height:16px"></div>
    <div class="seg">
      <button class="${anaMode === 'plans' ? 'on' : ''}" onclick="setAnaMode('plans')">Pläne</button>
      <button class="${anaMode === 'exercises' ? 'on' : ''}" onclick="setAnaMode('exercises')">Übungen</button>
      <button class="${anaMode === 'muscles' ? 'on' : ''}" onclick="setAnaMode('muscles')">Muskeln</button>
      <button class="${anaMode === 'weeks' ? 'on' : ''}" onclick="setAnaMode('weeks')">Wochen</button>
    </div>`;
  return h + (anaMode === 'muscles' ? rMuscleStats()
    : anaMode === 'exercises' ? rExerciseAnalysis()
    : anaMode === 'weeks' ? rWeekStats()
    : rPlanAnalysis());
}
function setAnaMode(m) { anaMode = m; render(); }

function rPlanAnalysis() {
  const names = [];
  for (const w of S.workouts) if (!names.includes(w.planName)) names.push(w.planName);
  anaPlans = names;
  let h = '';
  if (!names.length) {
    return `<div class="empty"><span class="big">📈</span>Noch keine Daten.<br>Absolviere Trainings mit deinen Plänen –<br>dann siehst du hier deine Kraftentwicklung.</div>`;
  }
  if (!selAnaPlan || !names.includes(selAnaPlan)) selAnaPlan = names[0];
  h += `<div class="chips" style="margin-bottom:16px">${names.map((n, i) =>
    `<button class="chip ${n === selAnaPlan ? 'on' : ''}" onclick="pickAnaPlan(${i})">${esc(n)}</button>`).join('')}</div>`;

  const sessions = S.workouts.filter(w => w.planName === selAnaPlan).sort((a, b) => a.date.localeCompare(b.date));
  const vols = sessions.map(volume);
  const volDiff = vols.length >= 2 && vols[0] > 0 ? Math.round((vols[vols.length - 1] - vols[0]) / vols[0] * 100) : null;
  h += `<div class="stats" style="margin:0 0 12px">
    <div class="stat"><div class="v">${sessions.length}</div><div class="l">Einheiten</div></div>
    <div class="stat"><div class="v">${Math.round(vols[vols.length - 1]).toLocaleString('de-DE')}</div><div class="l">kg Volumen zuletzt</div></div>
    <div class="stat"><div class="v" style="color:${volDiff === null ? 'var(--muted)' : volDiff >= 0 ? 'var(--accent2)' : 'var(--danger)'}">${volDiff === null ? '–' : (volDiff >= 0 ? '+' : '') + volDiff + '%'}</div><div class="l">Volumen-Trend</div></div>
  </div>`;

  if (sessions.length >= 2) {
    h += `<div class="card"><b>Trainingsvolumen pro Einheit</b>
      <div class="hint" style="margin-bottom:6px">Summe aus Gewicht × Wiederholungen aller Sätze</div>
      ${lineChart(vols, 'var(--accent2)')}</div>`;
  } else {
    h += `<div class="card"><div class="sub">Absolviere mindestens 2 Trainings mit diesem Plan, um Verlaufskurven zu sehen.</div></div>`;
  }

  // Kraft pro Einheit: Ø des besten (RPE-korrigierten) 1RM je Übung – Stärke statt Menge
  const strengths = [];
  for (const w of sessions) {
    const best = [];
    for (const e of w.entries) {
      const ss = e.sets.filter(s => s.mins == null && !isWarmup(s));
      if (ss.length) best.push(Math.max(...ss.map(e1rmAdj)));
    }
    if (best.length) strengths.push(best.reduce((a, b) => a + b, 0) / best.length);
  }
  const rpesLast = [];
  for (const e of sessions[sessions.length - 1].entries)
    for (const s of e.sets) if (s.rpe) rpesLast.push(s.rpe);
  if (strengths.length) {
    const strDiff = strengths.length >= 2 && strengths[0] > 0 ? Math.round((strengths[strengths.length - 1] - strengths[0]) / strengths[0] * 100) : null;
    h += `<div class="stats" style="margin:0 0 12px">
      <div class="stat"><div class="v">${r1(strengths[strengths.length - 1])}</div><div class="l">Ø Kraftwert zuletzt</div></div>
      <div class="stat"><div class="v" style="color:${strDiff === null ? 'var(--muted)' : strDiff >= 0 ? 'var(--accent2)' : 'var(--danger)'}">${strDiff === null ? '–' : (strDiff >= 0 ? '+' : '') + strDiff + '%'}</div><div class="l">Kraft-Trend</div></div>
      <div class="stat"><div class="v">${rpesLast.length ? r1(rpesLast.reduce((a, b) => a + b, 0) / rpesLast.length) : '–'}</div><div class="l">Ø RPE zuletzt</div></div>
    </div>`;
    if (strengths.length >= 2) {
      h += `<div class="card"><b>Kraft pro Einheit</b>
        <div class="hint" style="margin-bottom:6px">Ø des besten geschätzten 1RM je Übung (RPE-korrigiert) – zeigt Stärkeentwicklung statt Menge</div>
        ${lineChart(strengths.map(r1), 'var(--accent)')}</div>`;
    }
  }

  h += `<h2>Kraft pro Übung</h2>
    <div class="hint" style="margin:-4px 0 12px">Kraftwert = geschätztes 1RM nach Epley: Gewicht × (1 + Wdh. ÷ 30), bei erfasstem RPE um die Wiederholungs-Reserve korrigiert. So sind Hypertrophie- und Maximalkraft-Einheiten vergleichbar.</div>`;

  const exNames = [];
  for (const w of sessions) for (const e of w.entries)
    if (e.sets.length && !exNames.some(x => x.toLowerCase() === e.name.toLowerCase())) exNames.push(e.name);

  for (const name of exNames) {
    const pts = [];
    for (const w of sessions) {
      const e = w.entries.find(e => e.name.toLowerCase() === name.toLowerCase());
      if (!e) continue;
      const strengthSets = e.sets.filter(s => s.mins == null && !isWarmup(s));
      if (strengthSets.length) pts.push({ est: Math.max(...strengthSets.map(e1rmAdj)), top: Math.max(...strengthSets.map(s => s.weight)) });
    }
    if (!pts.length) continue; // reine Cardio-Übungen haben keine Kraftkurve
    const first = pts[0].est, last = pts[pts.length - 1].est;
    const diff = r1(last - first);
    const pct = first > 0 ? Math.round((last - first) / first * 100) : null;
    const ms = musclesFor(name);
    h += `<div class="card">
      <div class="listitem">
        <div><b style="font-size:16px">${esc(name)}</b>${ms.length ? ' &nbsp;' + ms.map(badge).join(' ') : ''}</div>
        <div style="text-align:right"><span style="font-size:19px;font-weight:800;color:var(--accent)">${r1(last)} kg</span>
          ${pts.length > 1 ? `<div class="sub" style="font-size:12px;color:${diff >= 0 ? 'var(--accent2)' : 'var(--danger)'}">${diff >= 0 ? '+' : ''}${diff} kg${pct !== null ? ' (' + (pct >= 0 ? '+' : '') + pct + '%)' : ''}</div>` : ''}
        </div>
      </div>
      <div class="hint">Schwerster Satz zuletzt: <b>${pts[pts.length - 1].top} kg</b></div>
      ${pts.length >= 2 ? `<div style="margin-top:8px">${lineChart(pts.map(p => p.est), 'var(--accent)')}</div>`
        : `<div class="hint">Noch zu wenige Einheiten für eine Kurve.</div>`}
    </div>`;
  }
  return h;
}
function pickAnaPlan(i) { selAnaPlan = anaPlans[i]; render(); }

/* ===== Übungs-Analyse (planübergreifend) ===== */
function rExerciseAnalysis() {
  // Übungen mit Kraft-Sätzen, zuletzt trainierte zuerst
  const names = [];
  for (const w of [...S.workouts].sort((a, b) => b.date.localeCompare(a.date)))
    for (const e of w.entries)
      if (e.sets.some(s => s.mins == null) && !names.some(n => n.toLowerCase() === e.name.toLowerCase())) names.push(e.name);
  anaExNames = names;
  if (!names.length) {
    return `<div class="empty"><span class="big">📈</span>Noch keine Kraft-Daten.<br>Absolviere Trainings – dann siehst du hier<br>deine Entwicklung pro Übung.</div>`;
  }
  if (!selAnaEx || !names.some(n => n.toLowerCase() === selAnaEx.toLowerCase())) selAnaEx = names[0];
  let h = `<div class="hint" style="margin:0 4px 10px">Kraftentwicklung über ALLE Trainings – egal, in welchem Plan die Übung vorkam.</div>
    <div class="chips" style="margin-bottom:16px">${names.slice(0, 20).map((n, i) =>
    `<button class="chip ${n === selAnaEx ? 'on' : ''}" onclick="pickAnaEx(${i})">${esc(n)}</button>`).join('')}</div>`;

  // alle Einheiten mit dieser Übung, planunabhängig, ohne Aufwärmsätze
  const pts = [];
  for (const w of [...S.workouts].sort((a, b) => a.date.localeCompare(b.date))) {
    const e = w.entries.find(e => e.name.toLowerCase() === selAnaEx.toLowerCase());
    if (!e) continue;
    const ss = e.sets.filter(s => s.mins == null && !isWarmup(s));
    if (!ss.length) continue;
    const rpes = ss.filter(s => s.rpe);
    pts.push({
      est: Math.max(...ss.map(e1rmAdj)),
      top: Math.max(...ss.map(s => s.weight)),
      rpe: rpes.length ? rpes.reduce((a, b) => a + b.rpe, 0) / rpes.length : null
    });
  }
  if (!pts.length) return h + `<div class="card"><div class="sub">Für diese Übung gibt es noch keine Kraft-Sätze.</div></div>`;
  const first = pts[0].est, lastP = pts[pts.length - 1].est;
  const pct = first > 0 ? Math.round((lastP - first) / first * 100) : null;
  const ms = musclesFor(selAnaEx);
  h += `<div class="card">
    <div class="listitem">
      <div><b style="font-size:16px">${esc(selAnaEx)}</b>${ms.length ? ' &nbsp;' + ms.map(badge).join(' ') : ''}</div>
      <div style="text-align:right"><span style="font-size:19px;font-weight:800;color:var(--accent)">${r1(lastP)} kg</span>
        ${pts.length > 1 ? `<div class="sub" style="font-size:12px;color:${lastP - first >= 0 ? 'var(--accent2)' : 'var(--danger)'}">${lastP - first >= 0 ? '+' : ''}${r1(lastP - first)} kg${pct !== null ? ' (' + (pct >= 0 ? '+' : '') + pct + '%)' : ''}</div>` : ''}
      </div>
    </div>
    <div class="hint">${pts.length} Einheiten · schwerster Satz zuletzt: <b>${pts[pts.length - 1].top} kg</b></div>
    ${pts.length >= 2 ? `<div style="margin-top:8px">${lineChart(pts.map(p => p.est), 'var(--accent)')}</div>`
      : `<div class="hint">Noch zu wenige Einheiten für eine Kurve.</div>`}
  </div>`;

  // Ø RPE pro Einheit – sinkender RPE bei gleicher/steigender Last = stärker geworden
  const rpePts = pts.filter(p => p.rpe != null).map(p => r1(p.rpe));
  if (rpePts.length >= 2) {
    h += `<div class="card"><b>Ø RPE pro Einheit</b>
      <div class="hint" style="margin-bottom:6px">Sinkt der RPE, während die Kraftkurve steigt, bist du wirklich stärker geworden</div>
      ${lineChart(rpePts, 'var(--orange)')}</div>`;
  } else {
    h += `<div class="card"><div class="sub">Trage beim Training RPE ein (Anstrengung 1–10), um hier deine Belastung auszuwerten.</div></div>`;
  }
  return h;
}
function pickAnaEx(i) { selAnaEx = anaExNames[i]; render(); }

/* ===== Wochenübersicht ===== */
function rWeekStats() {
  if (!S.workouts.length) {
    return `<div class="empty"><span class="big">📅</span>Noch keine Trainings.<br>Leg los – dann siehst du hier deine Wochenbilanz.</div>`;
  }
  const mon = new Date(); mon.setHours(0, 0, 0, 0); mon.setDate(mon.getDate() - ((mon.getDay() + 6) % 7));
  const weeks = [];
  for (let k = 7; k >= 0; k--) {
    const s = new Date(mon); s.setDate(s.getDate() - 7 * k);
    const e = new Date(s); e.setDate(e.getDate() + 7);
    weeks.push({ s, e, n: 0, sets: 0, vol: 0, rs: 0, rc: 0 });
  }
  for (const w of S.workouts) {
    const t = new Date(w.date);
    for (const wk of weeks) {
      if (t >= wk.s && t < wk.e) {
        wk.n++;
        wk.vol += volume(w);
        for (const en of w.entries) for (const st of en.sets) {
          if (!isWarmup(st)) wk.sets++;
          if (st.rpe) { wk.rs += st.rpe; wk.rc++; }
        }
      }
    }
  }
  let h = `<div class="hint" style="margin:0 4px 12px">Die letzten 8 Wochen – so siehst du, ob du dranbleibst und wie hart die Wochen waren.</div>`;
  h += `<div class="card"><b>Volumen pro Woche</b>
    <div class="hint" style="margin-bottom:6px">Summe aus Gewicht × Wiederholungen (ohne Aufwärmsätze)</div>
    ${lineChart(weeks.map(w => Math.round(w.vol)), 'var(--accent2)')}</div>`;
  const maxVol = Math.max(...weeks.map(w => w.vol), 1);
  h += `<div class="card">`;
  [...weeks].reverse().forEach((wk, i) => {
    const label = i === 0 ? 'Diese Woche'
      : wk.s.toLocaleDateString('de-DE', { day: 'numeric', month: 'short' }) + ' – ' + new Date(wk.e - 1).toLocaleDateString('de-DE', { day: 'numeric', month: 'short' });
    h += `<div style="padding:${i === 0 ? '4px' : '14px'} 0 4px">
      <div class="listitem">
        <b style="font-size:15px">${label}</b>
        <span class="sub" style="margin:0">${wk.n}× · ${wk.sets} Sätze · ${Math.round(wk.vol).toLocaleString('de-DE')} kg${wk.rc ? ' · Ø RPE ' + r1(wk.rs / wk.rc) : ''}</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(wk.vol / maxVol * 100)}%;background:var(--accent)"></div></div>
    </div>`;
  });
  h += `</div>`;
  return h;
}

function rMuscleStats() {
  const cutoff = Date.now() - 30 * 864e5;
  const agg = new Map();
  for (const w of S.workouts) {
    if (new Date(w.date).getTime() < cutoff) continue;
    for (const e of w.entries) {
      const workSets = e.sets.filter(s => !isWarmup(s)); // Aufwärmsätze nicht mitzählen
      const vol = workSets.reduce((t, s) => t + (s.mins != null ? 0 : s.reps * s.weight), 0);
      for (const m of musclesOf(e)) {
        if (!agg.has(m)) agg.set(m, { sets: 0, vol: 0 });
        const a = agg.get(m);
        a.sets += workSets.length;
        a.vol += vol;
      }
    }
  }
  if (!agg.size) {
    return `<div class="empty"><span class="big">💪</span>Keine Trainings in den letzten 30 Tagen.<br>Leg los – dann siehst du hier, welche<br>Muskelgruppen du wie stark trainierst.</div>`;
  }
  const rows = [...agg.entries()].sort((a, b) => b[1].sets - a[1].sets);
  const maxSets = rows[0][1].sets;
  let h = `<div class="hint" style="margin:0 4px 12px">Sätze pro Muskelgruppe in den letzten 30 Tagen – so erkennst du Ungleichgewichte. Übungen mit mehreren Muskelgruppen zählen für jede davon.</div><div class="card">`;
  rows.forEach(([m, a], i) => {
    const c = mColor(m);
    h += `<div style="padding:${i === 0 ? '4px' : '14px'} 0 4px">
      <div class="listitem">
        <b style="font-size:15px;color:${c}">${esc(m)}</b>
        <span class="sub" style="margin:0">${a.sets} ${a.sets === 1 ? 'Satz' : 'Sätze'} · ${Math.round(a.vol).toLocaleString('de-DE')} kg</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(a.sets / maxSets * 100)}%;background:${c}"></div></div>
    </div>`;
  });
  h += `</div>`;
  const trained = rows.map(r => r[0]);
  const missing = MUSCLES.map(x => x[0]).filter(m => !trained.includes(m) && m !== 'Cardio');
  if (missing.length) {
    h += `<div class="card"><b style="font-size:14px">Nicht trainiert (30 Tage)</b>
      <div class="chips" style="margin-top:10px">${missing.map(badge).join(' ')}</div></div>`;
  }
  return h;
}

/* ================= One-Rep-Max ================= */
let ormNames = [];
function knownExercises() {
  const seen = new Map();
  const add = name => {
    const k = name.toLowerCase();
    if (!seen.has(k)) seen.set(k, name);
  };
  for (const o of S.orms) add(o.name);
  for (const p of S.plans) for (const e of p.exercises) add(e.name);
  for (const w of S.workouts) for (const e of w.entries) add(e.name);
  return [...seen.values()];
}
function musclesFor(name) {
  const k = name.toLowerCase();
  for (const p of S.plans) { const e = p.exercises.find(e => e.name.toLowerCase() === k); if (e) return musclesOf(e); }
  for (const w of S.workouts) { const e = w.entries.find(e => e.name.toLowerCase() === k); if (e) return musclesOf(e); }
  return [];
}
function rOrm() {
  ormNames = knownExercises();
  let h = `<h1>One-Rep-Max</h1><div class="sub">Dein Maximalgewicht für 1 Wiederholung</div><div style="height:18px"></div>
    <div class="card">
      <label class="fld" style="margin-top:0">Übung</label>
      <input id="orm-name" placeholder="z. B. Kniebeugen">
      ${ormNames.length ? `<div class="chips" style="margin-top:10px">${ormNames.slice(0, 12).map((n, i) =>
        `<button class="chip" onclick="fillOrmName(${i})">${esc(n)}</button>`).join('')}</div>` : ''}
      <label class="fld">Gewicht</label>
      <div class="row">
        <input id="orm-kg" type="number" inputmode="decimal" placeholder="kg" step="0.5" min="0">
        <button class="btn sm" style="flex:0 0 120px" onclick="addOrm()">Eintragen</button>
      </div>
    </div>`;

  // Nach Übung gruppieren, neueste zuerst
  const groups = new Map();
  for (const o of S.orms) {
    const k = o.name.toLowerCase();
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(o);
  }
  if (!groups.size) {
    h += `<div class="empty"><span class="big">🏆</span>Noch keine Einträge.<br>Trage dein erstes One-Rep-Max ein!</div>`;
    return h;
  }
  h += `<h2>Deine Bestwerte</h2>`;
  const sorted = [...groups.values()].sort((a, b) => b[b.length - 1].date.localeCompare(a[a.length - 1].date));
  for (const list of sorted) {
    const latest = list[list.length - 1];
    const best = Math.max(...list.map(o => o.kg));
    const first = list[0].kg;
    const diff = latest.kg - first;
    const ms = musclesFor(latest.name);
    h += `<div class="card">
      <div class="listitem">
        <div><b style="font-size:16px">${esc(latest.name)}</b>${ms.length ? ' &nbsp;' + ms.map(badge).join(' ') : ''}</div>
        <div style="text-align:right"><span style="font-size:21px;font-weight:800;color:var(--accent)">${latest.kg} kg</span>
          ${list.length > 1 ? `<div class="sub" style="font-size:12px;color:${diff >= 0 ? 'var(--accent2)' : 'var(--danger)'}">${diff >= 0 ? '+' : ''}${Math.round(diff * 10) / 10} kg seit Start</div>` : ''}
        </div>
      </div>
      <div class="chips" style="margin-top:10px">
        ${list.map(o => `<span class="setpill">${o.kg === best ? '🏆 ' : ''}<b>${o.kg} kg</b>&nbsp;<span style="color:var(--muted);font-weight:400;font-size:12px">${fmtDate(o.date)}</span>
          <span class="x" onclick="delOrm('${o.id}')">✕</span></span>`).join('')}
      </div>
    </div>`;
  }
  return h;
}
function fillOrmName(i) {
  document.getElementById('orm-name').value = ormNames[i] || '';
  document.getElementById('orm-kg').focus();
}
function addOrm() {
  const name = document.getElementById('orm-name').value.trim();
  const kg = parseFloat(document.getElementById('orm-kg').value);
  if (!name) { alert('Bitte gib eine Übung an.'); return; }
  if (isNaN(kg) || kg <= 0) { alert('Bitte ein gültiges Gewicht eingeben.'); return; }
  S.orms.push({ id: uid(), name, kg: Math.round(kg * 10) / 10, date: new Date().toISOString() });
  save(); render();
}
function delOrm(id) {
  S.orms = S.orms.filter(o => o.id !== id);
  save(); render();
}

/* ================= Körpergewicht ================= */
function rWeight() {
  const ws = S.weights;
  let h = `<h1>Körpergewicht</h1><div class="sub">Behalte deine Entwicklung im Blick</div><div style="height:18px"></div>
    <div class="card"><div class="row">
      <input id="bw" type="number" inputmode="decimal" placeholder="Gewicht in kg" step="0.1" min="1">
      <button class="btn sm" style="flex:0 0 120px" onclick="addBw()">Eintragen</button>
    </div></div>`;

  if (ws.length >= 2) {
    const pts = ws.slice(-15);
    const vals = pts.map(p => p.kg);
    const mn = Math.min(...vals), mx = Math.max(...vals);
    const pad = Math.max((mx - mn) * 0.2, 0.5);
    const lo = mn - pad, hi = mx + pad;
    const W = 320, H = 130, PL = 8, PR = 8, PT = 12, PB = 12;
    const X = i => PL + i * (W - PL - PR) / (pts.length - 1);
    const Y = v => PT + (1 - (v - lo) / (hi - lo)) * (H - PT - PB);
    const line = pts.map((p, i) => `${X(i).toFixed(1)},${Y(p.kg).toFixed(1)}`).join(' ');
    h += `<div class="card">
      <div class="sub" style="margin-bottom:8px">Letzte ${pts.length} Einträge &nbsp;·&nbsp; ${vals[vals.length-1]} kg
        <span style="color:${vals[vals.length-1] <= vals[0] ? 'var(--accent2)' : 'var(--danger)'}">
        (${(vals[vals.length-1] - vals[0] >= 0 ? '+' : '')}${(vals[vals.length-1] - vals[0]).toFixed(1)} kg)</span></div>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">
        <polyline points="${line}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        ${pts.map((p, i) => `<circle cx="${X(i).toFixed(1)}" cy="${Y(p.kg).toFixed(1)}" r="3.5" fill="var(--accent)"/>`).join('')}
      </svg></div>`;
  }

  if (!ws.length) {
    h += `<div class="empty"><span class="big">⚖️</span>Noch keine Einträge.<br>Trage dein aktuelles Gewicht ein!</div>`;
  } else {
    h += `<h2>Einträge</h2>`;
    [...ws].reverse().forEach((p, ri) => {
      const i = ws.length - 1 - ri;
      h += `<div class="card" style="padding:12px 16px"><div class="listitem">
        <div><b>${p.kg} kg</b> <span class="sub" style="display:inline;margin-left:8px">${fmtDate(p.date)}</span></div>
        <button class="iconbtn" onclick="delBw(${i})">✕</button>
      </div></div>`;
    });
  }
  return h;
}
function addBw() {
  const kg = parseFloat(document.getElementById('bw').value);
  if (isNaN(kg) || kg <= 0) { alert('Bitte ein gültiges Gewicht eingeben.'); return; }
  S.weights.push({ date: new Date().toISOString(), kg: Math.round(kg * 10) / 10 });
  save(); render();
}
function delBw(i) {
  S.weights.splice(i, 1);
  save(); render();
}

/* Beim allerersten Start: deine Pläne automatisch laden */
if (!S.plans.length && !S.workouts.length) loadTemplates(true);

applyTheme();
render();

/* ================= PWA: Offline & Update-Hinweis ================= */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          // Neue Version bereit, alte läuft noch -> Hinweis zeigen
          if (nw.state === 'installed' && navigator.serviceWorker.controller) showUpdateBanner();
        });
      });
    }).catch(() => {});
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      location.reload();
    });
  });
}
function showUpdateBanner() {
  if (document.getElementById('updbar')) return;
  const bar = document.createElement('div');
  bar.id = 'updbar';
  bar.innerHTML = `<span>✨ Update verfügbar</span>
    <button id="updbtn" style="background:rgba(255,255,255,0.25);border:none;color:#fff;font-family:inherit;font-size:14px;font-weight:700;border-radius:9px;padding:7px 13px;cursor:pointer">Jetzt laden</button>`;
  Object.assign(bar.style, {
    position: 'fixed', left: '16px', right: '16px',
    bottom: 'calc(env(safe-area-inset-bottom) + 82px)',
    background: 'var(--accent2)', color: '#fff', borderRadius: '16px',
    padding: '13px 18px', display: 'flex', alignItems: 'center',
    justifyContent: 'space-between', fontSize: '16px', fontWeight: '600',
    zIndex: '70', boxShadow: '0 8px 24px rgba(0,0,0,0.22)',
    maxWidth: '528px', margin: '0 auto'
  });
  document.body.appendChild(bar);
  document.getElementById('updbtn').onclick = () => {
    bar.querySelector('span').textContent = '⏳ wird geladen …';
    navigator.serviceWorker.getRegistration().then(reg => {
      if (reg && reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
      else location.reload();
    });
  };
}
</script>
